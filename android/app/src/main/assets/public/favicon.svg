<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wood Frame Shadow -->
  <rect x="4" y="6" width="92" height="92" rx="12" fill="#000000" opacity="0.15" />
  
  <!-- Wood Frame -->
  <rect x="4" y="4" width="92" height="92" rx="12" fill="#8D6E63" />
  
  <!-- Frame Inner Shadow -->
  <rect x="12" y="12" width="76" height="76" rx="6" fill="#5D4037" opacity="0.4" />
  
  <!-- Cork Board -->
  <rect x="12" y="12" width="76" height="74" rx="6" fill="#E7C29B" />
  
  <!-- Cork Texture (simple dots) -->
  <g fill="#C89F70">
    <circle cx="22" cy="22" r="1.5" />
    <circle cx="38" cy="18" r="1" />
    <circle cx="78" cy="26" r="2" />
    <circle cx="26" cy="78" r="1.5" />
    <circle cx="72" cy="80" r="1" />
    <circle cx="52" cy="82" r="2" />
    <circle cx="82" cy="52" r="1.5" />
    <circle cx="18" cy="52" r="1" />
    <circle cx="45" cy="40" r="1.5" />
    <circle cx="60" cy="20" r="1" />
    <circle cx="30" cy="60" r="2" />
    <circle cx="65" cy="65" r="1.5" />
    <circle cx="20" cy="35" r="1" />
    <circle cx="80" cy="65" r="1" />
    <circle cx="40" cy="70" r="1.5" />
  </g>

  <!-- Note 1 (Yellow Sticky) -->
  <g transform="translate(18, 22) rotate(-6)">
    <!-- Shadow -->
    <rect x="1" y="2" width="38" height="38" rx="2" fill="#000000" opacity="0.15" />
    <!-- Paper -->
    <rect width="38" height="38" rx="2" fill="#FFF59D" />
    <!-- Lines -->
    <line x1="8" y1="14" x2="30" y2="14" stroke="#E6C553" stroke-width="2" stroke-linecap="round" />
    <line x1="8" y1="22" x2="26" y2="22" stroke="#E6C553" stroke-width="2" stroke-linecap="round" />
    <line x1="8" y1="30" x2="30" y2="30" stroke="#E6C553" stroke-width="2" stroke-linecap="round" />
    <!-- Pin Shadow -->
    <circle cx="19" cy="8" r="3.5" fill="#000000" opacity="0.2" />
    <!-- Pin -->
    <circle cx="19" cy="6" r="3.5" fill="#EF5350" />
    <circle cx="17.5" cy="4.5" r="1" fill="#FFEBEE" />
  </g>

  <!-- Note 2 (Polaroid/Photo) -->
  <g transform="translate(46, 40) rotate(8)">
    <!-- Shadow -->
    <rect x="1" y="2" width="34" height="40" rx="2" fill="#000000" opacity="0.15" />
    <!-- Paper -->
    <rect width="34" height="40" rx="2" fill="#FAFAFA" />
    <!-- Photo area -->
    <rect x="3" y="3" width="28" height="26" fill="#81D4FA" />
    <!-- Mountain -->
    <path d="M 3 29 L 12 18 L 18 24 L 25 16 L 31 29 Z" fill="#4FC3F7" />
    <!-- Sun -->
    <circle cx="23" cy="10" r="4" fill="#FFE082" />
    <!-- Pin Shadow -->
    <circle cx="17" cy="6" r="3.5" fill="#000000" opacity="0.2" />
    <!-- Pin -->
    <circle cx="17" cy="4" r="3.5" fill="#42A5F5" />
    <circle cx="15.5" cy="2.5" r="1" fill="#E3F2FD" />
  </g>
</svg>
